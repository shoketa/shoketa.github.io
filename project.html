<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Allen Velazco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
  .project-page {
    padding: 48px 36px 96px;
    overflow-y: auto;
  }

  .project-inner {
    max-width: 865px;
    margin: 0 auto;
    scroll-behavior: smooth;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    transition: color 0.15s;
    margin-bottom: 40px;
  }

  .back-link:hover { color: var(--text); }

  .project-hero {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 8px;
    display: block;
    margin-bottom: 36px;
    background: var(--bg2);
  }

  .project-hero-placeholder {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    margin-bottom: 36px;
  }

  .project-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--accent);
    margin-bottom: 32px;
    line-height: 1.2;
  }

  /* Markdown content */
  .project-content h1,
  .project-content h2,
  .project-content h3,
  .project-content h4 {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    color: var(--h-accent);
    margin: 32px 0 12px;
    line-height: 1.3;
  }

  .project-content h1 { font-size: 20px; }
  .project-content h2 { font-size: 17px; }
  .project-content h3 { font-size: 15px; }
  .project-content h4 { font-size: 13px; color: var(--text-less-muted); }

  .project-content p {
    color: var(--text-less-muted);
    font-size: 13px;
    line-height: 1.8;
    margin-bottom: 16px;
  }

  .project-content img,
  .project-content video {
    width: 100%;
    border-radius: 6px;
    display: block;
    margin: 24px 0;
  }

  .project-content ul,
  .project-content ol {
    padding-left: 20px;
    margin-bottom: 16px;
  }

  .project-content li {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.8;
  }

  .project-content a {
    color: var(--accent);
    text-underline-offset: 3px;
    text-decoration: underline;
    text-decoration-color: rgba(200,245,90,0.3);
    transition: text-decoration-color 0.15s;
  }

  .project-content a:hover { text-decoration-color: var(--accent); }

  .project-content code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--accent);
  }

  .project-content pre {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    overflow-x: auto;
    margin: 20px 0;
  }

  .project-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
    font-size: 12px;
    line-height: 1.7;
  }

  .project-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }

  .project-content blockquote {
    border-left: 2px solid var(--accent);
    padding-left: 16px;
    margin: 20px 0;
    color: var(--text-muted);
    font-style: italic;
  }

  .project-content table {
    border-collapse: collapse;
    width: 100%;
    margin: 24px 0;
    font-size: 14px;
  }

  .project-content th,
  .project-content td {
    border: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    vertical-align: top;
  }

  .project-content th {
    background: var(--surface);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .project-content td img,
  .project-content td video {
    width: 100%;
    margin: 0;
    border-radius: 4px;
  }

  @media (max-width: 680px) {
    .project-page { padding: 24px 20px 64px; }
    .project-title { font-size: 20px; }
    .project-content table { display: block; overflow-x: auto; white-space: nowrap; }
    .project-content td, .project-content th { white-space: normal; min-width: 140px; }
    .project-content td img, .project-content td video { width: 100%; min-width: unset; }
  }
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  #lightbox.open { display: flex; }
  #lightbox-img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    transform-origin: center center;
  }
  #lightbox-video {
    display: none;
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    opacity: 0.7;
    line-height: 1;
  }
  #lightbox-close:hover { opacity: 1; }
</style>
</head>
<body>

<!-- MOBILE HEADER -->
<header class="mobile-header">
  <span class="mobile-name">Allen Velazco</span>
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
    Menu
  </button>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar-left">
    <div id="sidebar-scene"></div>
    <div class="name">Allen Velazco</div>
    <div class="tagline">Aspiring Technical artist</div>

    <nav class="nav-section">
      <a href="/" class="nav-link">
        <span class="arrow">→</span> Home
      </a>
      <a href="/#about" class="nav-link">
        <span class="arrow">→</span> About Me
      </a>
    </nav>

    <nav class="nav-section">
      <a href="/#portfolio" class="nav-link">
        <span class="arrow">→</span> Portfolio Pieces
      </a>
      <a href="/#games" class="nav-link">
        <span class="arrow">→</span> Game Projects
      </a>
      <a href="/#personal" class="nav-link">
        <span class="arrow">→</span> Personal Projects
      </a>
    </nav>

    <button id="theme-toggle" aria-label="Toggle theme"></button>
  </aside>

  <!-- MAIN -->
  <main class="project-page">
    <div class="project-inner">
      <a href="/" class="back-link fade-in">
        <span class="arrow">←</span> Back
      </a>

      <div id="hero-slot"></div>

      <h1 class="project-title fade-in" id="project-title">Loading…</h1>

      <article class="project-content fade-in" id="project-content"></article>
    </div>
  </main>

</div>

<script>
  const toggle = document.getElementById('menuToggle');
  const sidebar = document.querySelector('.sidebar-left');
  toggle.addEventListener('click', () => {
    const isOpen = sidebar.classList.toggle('open');
    toggle.classList.toggle('open', isOpen);
    toggle.querySelector('.hamburger').nextSibling.textContent = isOpen ? ' Close' : ' Menu';
  });
</script>
<script type="module" src="/theme.js"></script>
<script type="module" src="/project-loader.js"></script>
<script type="module" src="/sidebar-scene.js"></script>

</body>
</html>
