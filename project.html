<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Allen Velazco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- MOBILE HEADER -->
<header class="mobile-header">
  <span class="mobile-name">Allen Velazco</span>
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
    Menu
  </button>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar-left">
    <div id="sidebar-scene"></div>
    <div class="name">Allen Velazco</div>
    <div class="tagline">Aspiring Technical artist</div>

    <nav class="nav-section">
      <a href="/index.html" class="nav-link">
        <span class="arrow">→</span> Home
      </a>
      <div class="nav-link">
        <span class="arrow">→</span> About Me
      </div>
    </nav>

    <nav class="nav-section" id="nav-portfolio-section">
      <div class="nav-link" id="nav-portfolio">
        <span class="arrow">→</span> Portfolio Pieces
      </div>
    </nav>

    <nav class="nav-section" id="nav-game-section">
      <div class="nav-link" id="nav-game">
        <span class="arrow">→</span> Game Projects
      </div>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

  </main>

</div>


<script>
  // Inject active project into sidebar nav
  (async () => {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) return;
    let projects;
    try {
      const res = await fetch('/data/projects.json');
      projects = await res.json();
    } catch { return; }
    const project = projects.find(p => p.id === id);
    if (!project) return;

    const sectionId = project.section === 'game' ? 'nav-game' : 'nav-portfolio';
    const navLink = document.getElementById(sectionId);
    if (navLink) {
      navLink.classList.add('active');
      const sublink = document.createElement('div');
      sublink.className = 'nav-sublink';
      sublink.textContent = project.title;
      navLink.insertAdjacentElement('afterend', sublink);
    }
    document.title = `${project.title} — Allen Velazco`;
  })();
</script>

<script>
  const toggle = document.getElementById('menuToggle');
  const sidebar = document.querySelector('.sidebar-left');
  toggle.addEventListener('click', () => {
    const isOpen = sidebar.classList.toggle('open');
    toggle.classList.toggle('open', isOpen);
    toggle.querySelector('.hamburger').nextSibling.textContent = isOpen ? ' Close' : ' Menu';
  });
  sidebar.querySelectorAll('.nav-link, .social-link').forEach(link => {
    link.addEventListener('click', () => {
      sidebar.classList.remove('open');
      toggle.classList.remove('open');
    });
  });
</script>
<script type="module" src="/sidebar-scene.js"></script>
</body>
</html>
