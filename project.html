<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Allen Velazco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="icon" href="/images/icon.png" type="image/png">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/glsl.min.js"></script>
<script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');if(t==='light')document.documentElement.classList.add('light');})()</script>
<style>
  .project-page {
    padding: 48px 36px 96px;
  }

  .project-inner {
    max-width: 1038px;
    margin: 0 auto;
    scroll-behavior: smooth;
  }

  #hero-slot {
    max-width: 1142px;
    margin: 0 auto;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    transition: color 0.15s;
    margin-bottom: 40px;
  }

  .back-link:hover { color: var(--text); }

  .project-hero {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 8px;
    display: block;
    margin-bottom: 36px;
    background: var(--bg2);
  }

  .project-hero-placeholder {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    margin-bottom: 36px;
  }

  .project-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--accent);
    margin-bottom: 32px;
    line-height: 1.2;
  }

  /* Markdown content */
  .project-content h1,
  .project-content h2,
  .project-content h3,
  .project-content h4,
  .project-content h5
   {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    color: var(--h-accent);
    margin: 32px 0 12px;
    line-height: 1.3;
  }

  .project-content h1 { font-size: 20px; }
  .project-content h2 { font-size: 17px; }
  .project-content h3 { font-size: 15px; }
  .project-content h4 { font-size: 13px; color: var(--text-less-muted); }
  .project-content h5 { font-size: 12px; color: var(--text-less-muted); }

  .project-content p {
    color: var(--text-less-muted);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 16px;
  }

  .project-content img,
  .project-content video {
    width: 95%;
    border-radius: 6px;
    display: block;
    margin: 24px auto;
    -webkit-mask-image:
      linear-gradient(to right,  transparent 0%, black 3%, black 97%, transparent 100%),
      linear-gradient(to bottom, transparent 0%, black 3%, black 97%, transparent 100%);
    mask-image:
      linear-gradient(to right,  transparent 0%, black 3%, black 97%, transparent 100%),
      linear-gradient(to bottom, transparent 0%, black 3%, black 97%, transparent 100%);
    -webkit-mask-composite: destination-in;
    mask-composite: intersect;
  }

  .project-content ul,
  .project-content ol {
    padding-left: 20px;
    margin-bottom: 16px;
  }

  .project-content li {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.8;
  }

  .project-content a {
    color: var(--accent);
    text-underline-offset: 3px;
    text-decoration: underline;
    text-decoration-color: rgba(200,245,90,0.3);
    transition: text-decoration-color 0.15s;
  }

  .project-content a:hover { text-decoration-color: var(--accent); }

  .project-content code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--accent);
  }

  .project-content pre {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px 18px;
    overflow-x: auto;
    margin: 20px 0;
  }

  .code-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 8px;
  }

  .code-lang-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.6;
    pointer-events: none;
    user-select: none;
    text-transform: lowercase;
  }

  .code-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: var(--text-less-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    opacity: 0.5;
    transition: opacity 0.15s;
  }

  .code-toggle:hover {
    opacity: 1;
  }

  .project-content pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.7;
  }

  .project-content pre code.hljs {
    background: none;
    padding: 0;
  }

  .project-content .spacer { height: 1.2em; }

  .project-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
    clear: both;
  }

  .project-content blockquote {
    border-left: 2px solid var(--accent);
    padding-left: 16px;
    margin: 20px 0;
    color: var(--text-muted);
    font-style: italic;
  }

  .project-content table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
    font-size: 14px;
  }

  .project-content td,
  .project-content th {
    word-break: break-word;
    overflow-wrap: break-word;
    overflow: hidden;
    max-width: 0;
  }

  .project-content td img,
  .project-content td video {
    max-width: 100% !important;
    width: 100% !important;
    height: auto !important;
    display: block;
    -webkit-mask-image: none;
    mask-image: none;
  }

  .project-content th,
  .project-content td {
    border: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    vertical-align: top;
  }

  .project-content th {
    background: var(--surface);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .project-content td img,
  .project-content td video {
    width: 100%;
    margin: 0;
    border-radius: 4px;
  }

  @media (max-width: 744px) {
    .project-page { padding: 24px 20px 64px; }
    .project-title { font-size: 20px; }
  }
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  #lightbox.open { display: flex; }
  #lightbox-img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    transform-origin: center center;
  }
  #lightbox-video {
    display: none;
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 4px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    opacity: 0.7;
    line-height: 1;
  }
  #lightbox-close:hover { opacity: 1; }
</style>
</head>
<body>

<!-- MOBILE HEADER -->
<header class="mobile-header">
  <span class="mobile-name">Allen Velazco</span>
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
    Menu
  </button>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar-left">
    <div id="sidebar-scene"></div>
    <a href="/" class="name">Allen Velazco</a>
    <div class="tagline">Aspiring Technical artist</div>

    <nav class="nav-section">
      <a href="/" class="nav-link">
        <span class="arrow">→</span> Home
      </a>
      <a href="/#about" class="nav-link">
        <span class="arrow">→</span> About Me
      </a>
    </nav>

    <nav class="nav-section" id="nav-portfolio">
      <a href="/#portfolio" class="nav-link">
        <span class="arrow">→</span> Portfolio Pieces
      </a>
    </nav>
    <nav class="nav-section" id="nav-game">
      <a href="/#games" class="nav-link">
        <span class="arrow">→</span> Game Projects
      </a>
    </nav>
    <nav class="nav-section" id="nav-personal">
      <a href="/#personal" class="nav-link">
        <span class="arrow">→</span> Personal Projects
      </a>
    </nav>

    <button id="theme-toggle" aria-label="Toggle theme"></button>

    <div style="margin-top:auto;">
      <div class="sidebar-label">Socials</div>
      <div style="display: flex;">
        <a href="/Allen Velazco.pdf" target="_blank" rel="noopener" class="social-link">
          <svg width="25" height="25" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm8 1.5V8h4.5L14 3.5zM8 13h8v2H8v-2zm0 4h8v2H8v-2zm0-8h5v2H8V9z"/>
          </svg>
        </a>
        <a href="https://www.linkedin.com/in/allen-velazco-181236278/" target="_blank" rel="noopener" class="social-link">
          <svg width="25" height="25" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.37V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.59 0 4.26 2.36 4.26 5.44v6.3zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM3.56 20.45h3.55V9H3.56v11.45z"/></svg>
        </a>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="project-page">
    <div class="project-inner">
      <a href="/" class="back-link fade-in">
        <span class="arrow">←</span> Back
      </a>
    </div>

    <div id="hero-slot"></div>

    <div class="project-inner">
      <h1 class="project-title fade-in" id="project-title">Loading…</h1>
      <article class="project-content fade-in" id="project-content"></article>
    </div>
  </main>

</div>

<div id="overlay">
  <img src="/images/icon-transparent.png" class="overlay-spinner" alt="">
</div>
<script>
  // Don't wait for 'load' — dismiss overlay once content is rendered by project-loader
  const _ovCheck = setInterval(() => {
    if (document.getElementById('project-content')?.innerHTML) {
      clearInterval(_ovCheck);
      if (window.hljs) {
        hljs.registerAliases(['hlsl'], { languageName: 'glsl' });
        hljs.highlightAll();
        document.querySelectorAll('.project-content pre code[class*="language-"]').forEach(block => {
          const pre = block.parentElement;
          const m = block.className.match(/language-(\w+)/);

          const toolbar = document.createElement('div');
          toolbar.className = 'code-toolbar';

          if (m) {
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = m[1];
            toolbar.appendChild(label);
          }

          const toggle = document.createElement('button');
          toggle.className = 'code-toggle';
          toggle.textContent = '-';
          toggle.addEventListener('click', () => {
            const hidden = block.style.display === 'none';
            block.style.display = hidden ? '' : 'none';
            toggle.textContent = hidden ? '-' : '+';
          });
          toolbar.appendChild(toggle);

          pre.insertBefore(toolbar, pre.firstChild);
        });
      }
      const o = document.getElementById('overlay');
      if (o) { o.classList.add('hidden'); o.addEventListener('transitionend', () => o.remove(), { once: true }); }
    }
  }, 50);
  // Fallback: dismiss after 4s no matter what
  setTimeout(() => { clearInterval(_ovCheck); const o = document.getElementById('overlay'); if (o) { o.classList.add('hidden'); o.addEventListener('transitionend', () => o.remove(), { once: true }); } }, 4000);
</script>
<script>
  const toggle = document.getElementById('menuToggle');
  const sidebar = document.querySelector('.sidebar-left');
  toggle.addEventListener('click', () => {
    const isOpen = sidebar.classList.toggle('open');
    toggle.classList.toggle('open', isOpen);
    toggle.querySelector('.hamburger').nextSibling.textContent = isOpen ? ' Close' : ' Menu';
  });
</script>
<script>
  // Populate sidebar project listings
  (async () => {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) return;
    try {
      const projects = await fetch('/data/projects.json').then(r => r.json());
      const current = projects.find(p => p.id === id);
      if (!current) return;

      const sectionMap = { portfolio: 'nav-portfolio', game: 'nav-game', personal: 'nav-personal' };
      const navId = sectionMap[current.section];
      const nav = navId && document.getElementById(navId);
      if (nav) {
        nav.querySelector('.nav-link').classList.add('active');
        projects.filter(p => p.section === current.section).forEach(p => {
          const link = document.createElement('a');
          link.href = p.link;
          link.className = 'nav-sublink' + (p.id === id ? ' nav-sublink-active' : '');
          link.innerHTML = '<span class="sub-arrow">⬑</span> ' + p.title;
          nav.appendChild(link);
        });
      }

      document.title = (current.title || id) + ' — Allen Velazco';
    } catch (_) {}
  })();
</script>
<script type="module" src="/theme.js"></script>
<script type="module" src="/project-loader.js"></script>
<script type="module" src="/sidebar-scene.js"></script>
<script type="module">
  import { smoothScrollToEl } from '/smooth-scroll.js';
  document.querySelector('.sidebar-left').querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', e => {
      const href = link.getAttribute('href');
      if (!href || !href.startsWith('#')) return;
      const target = document.querySelector(href);
      if (!target) return;
      e.preventDefault();
      smoothScrollToEl(null, target, 40);
    });
  });
</script>

</body>
</html>
