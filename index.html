<div id="overlay">

<script>
  window.addEventListener('load', () => {
    const o = document.getElementById('overlay');
    o.classList.add('hidden');
    o.addEventListener('transitionend', () => o.remove(), { once: true });
  });
  window.addEventListener('pageshow', e => {
    if (e.persisted) {
      document.querySelectorAll('[data-nav-overlay]').forEach(el => el.remove());
    }
  });
</script>
<script>
  const toggle = document.getElementById('menuToggle');
  const sidebar = document.querySelector('.sidebar-left');
  toggle.addEventListener('click', () => {
    const isOpen = sidebar.classList.toggle('open');
    toggle.classList.toggle('open', isOpen);
    toggle.querySelector('.hamburger').nextSibling.textContent = isOpen ? ' Close' : ' Menu';
  });
  // Close sidebar on nav link click (scroll handled by module below)
  sidebar.querySelectorAll('.nav-link, .social-link').forEach(link => {
    link.addEventListener('click', () => {
      sidebar.classList.remove('open');
      toggle.classList.remove('open');
    });
  });
</script>
<script type="module" src="/theme.js"></script>
<script type="module" src="/portfolio-loader.js"></script>
<script type="module" src="/sidebar-scene.js"></script>
<script type="module">
  import { smoothScrollToEl } from '/smooth-scroll.js';

  const navLinks = document.querySelector('.sidebar-left').querySelectorAll('.nav-link[href^="#"]');
  const sections = [];

  navLinks.forEach(link => {
    link.addEventListener('click', e => {
      const target = document.querySelector(link.getAttribute('href'));
      if (!target) return;
      e.preventDefault();
      smoothScrollToEl(null, target, 40);
    });
    const target = document.querySelector(link.getAttribute('href'));
    if (target) sections.push({ el: target, link });
  });

  // Sort sections by DOM order so scroll-spy picks the last one above the threshold
  sections.sort((a, b) => a.el.compareDocumentPosition(b.el) & Node.DOCUMENT_POSITION_FOLLOWING ? -1 : 1);

  // Scroll-spy: highlight the nav link whose section is currently in view
  const allNavLinks = document.querySelector('.sidebar-left').querySelectorAll('.nav-link');
  function updateActive() {
    let current = null;
    for (const { el, link } of sections) {
      if (el.getBoundingClientRect().top <= 120) current = link;
    }
    allNavLinks.forEach(l => l.classList.remove('active'));
    if (current) current.classList.add('active');
  }

  window.addEventListener('scroll', updateActive, { passive: true });
  updateActive();
</script>
