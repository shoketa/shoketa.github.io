<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allen Velazco — Technical Artist Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<link rel="icon" href="/images/icon.png" type="image/png">
<link rel="stylesheet" href="/style.css">
<script>(function(){var t=localStorage.getItem('theme')||( window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');if(t==='light')document.documentElement.classList.add('light');})()</script>
</head>
<body>


<!-- MOBILE HEADER -->
<header class="mobile-header">
  <span class="mobile-name">Allen Velazco</span>
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
    <div class="hamburger">
      <span></span><span></span><span></span>
    </div>
    Menu
  </button>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar-left">
    <div id="sidebar-scene"></div>
    <a href="/" class="name">Allen Velazco</a>
    <div class="tagline">Aspiring Technical Artist</div>

    <nav class="nav-section">
      <div class="nav-link active">
        <span class="arrow">→</span> Home
      </div>
      <a href="#about" class="nav-link">
        <span class="arrow">→</span> About Me
      </a>
    </nav>

    <nav class="nav-section">
      <a href="#portfolio" class="nav-link">
        <span class="arrow">→</span> Portfolio Pieces
      </a>
      <a href="#games" class="nav-link">
        <span class="arrow">→</span> Game Projects
      </a>
      <a href="#personal" class="nav-link">
        <span class="arrow">→</span> Personal Projects
      </a>
    </nav>


    <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
      <a href="https://www.linkedin.com/in/allen-velazco-181236278/" target="_blank" rel="noopener" class="social-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.37V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.59 0 4.26 2.36 4.26 5.44v6.3zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM3.56 20.45h3.55V9H3.56v11.45z"/></svg>
      </a>
      <button id="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Portfolio Pieces -->
    <div class="section-header" id="portfolio" style="scroll-margin-top:40px;">
      <span class="section-title">Portfolio Pieces</span>
    </div>

    <div class="projects-grid" id="portfolio-grid"></div>

    <!-- Game Projects -->
    <div class="section-header" id="games" style="margin-top:36px; scroll-margin-top:40px;">
      <span class="section-title">Game Projects</span>
    </div>

    <div class="projects-grid" id="game-grid" style="margin-bottom:36px;"></div>

    <!-- Personal Projects -->
    <div class="section-header" id="personal" style="margin-top:36px; scroll-margin-top:40px;">
      <span class="section-title">Personal Projects</span>
    </div>

    <div class="projects-grid" id="personal-grid" style="margin-bottom:56px;"></div>

    <!-- About Me -->
    <div class="divider"></div>
    <section id="about" style="padding:40px 0 40px; scroll-margin-top:40px;">
      <div class="section-header">
        <span class="section-title">About Me</span>
      </div>
      <div class="about-body">
        <div id="about-content" class="about-content"></div>
        <img src="/images/photo.jpg" alt="photo" class="about-photo" loading="lazy">
      </div>
    </section>

  </main>


</div>


<div id="overlay"></div>
<script>
  window.addEventListener('load', () => {
    const o = document.getElementById('overlay');
    o.classList.add('hidden');
    o.addEventListener('transitionend', () => o.remove(), { once: true });
  });
</script>
<script>
  const toggle = document.getElementById('menuToggle');
  const sidebar = document.querySelector('.sidebar-left');
  toggle.addEventListener('click', () => {
    const isOpen = sidebar.classList.toggle('open');
    toggle.classList.toggle('open', isOpen);
    toggle.querySelector('.hamburger').nextSibling.textContent = isOpen ? ' Close' : ' Menu';
  });
  // Close sidebar + smooth-scroll when a nav link is clicked
  sidebar.querySelectorAll('.nav-link, .social-link').forEach(link => {
    link.addEventListener('click', e => {
      sidebar.classList.remove('open');
      toggle.classList.remove('open');
      const href = link.getAttribute('href');
      if (!href || !href.startsWith('#')) return;
      const target = document.querySelector(href);
      if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    });
  });
</script>
<script type="module" src="/theme.js"></script>
<script type="module" src="/portfolio-loader.js"></script>
<script type="module" src="/sidebar-scene.js"></script>
</body>
</html>
